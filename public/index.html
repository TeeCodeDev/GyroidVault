  <script>
    /**
     * EXTENSION FIX: Silence Enpass / 1Password 'webauthnInterceptor' errors.
     * These errors are external and do not affect the application's functionality.
     */
    (function() {
      const originalError = console.error;
      console.error = function() {
        const msg = String(arguments[0] || '');
        if (msg.includes('signalUnknownCredential') || msg.includes('webauthnInterceptor')) return;
        originalError.apply(console, arguments);
      };
      
      window.addEventListener('error', (e) => {
        const msg = e.message || (e.error && e.error.message) || String(e);
        if (msg.includes('signalUnknownCredential') || msg.includes('webauthnInterceptor')) {
          e.preventDefault();
          e.stopImmediatePropagation();
        }
      }, true);

      try {
        const mockFn = () => Promise.resolve();
        const props = ['signalUnknownCredential', 'signalUnknownCredentialAsync', 'isUserVerifyingPlatformAuthenticatorAvailable', 'isConditionalMediationAvailable'];
        
        if (typeof window.PublicKeyCredential === 'undefined') {
          window.PublicKeyCredential = function() {};
        }
        
        props.forEach(p => {
          if (window.PublicKeyCredential && !window.PublicKeyCredential[p]) {
            Object.defineProperty(window.PublicKeyCredential, p, { value: mockFn, writable: true });
          }
          if (window.PublicKeyCredential.prototype && !window.PublicKeyCredential.prototype[p]) {
            Object.defineProperty(window.PublicKeyCredential.prototype, p, { value: mockFn, writable: true });
          }
        });

        if (navigator.credentials && !navigator.credentials.signalUnknownCredential) {
          Object.defineProperty(navigator.credentials, 'signalUnknownCredential', { value: mockFn, writable: true });
        }
      } catch (e) {}
    })();
  </script>
